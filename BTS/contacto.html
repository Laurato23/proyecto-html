<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>BTS | Contacto</title>
    <link rel="icon" href="favicon.ico">
</head>
<body>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
  
    font-family: "Times New Roman", Times, serif;
    background-color: #f5f0fa;
    color: #2c2c2c;
    line-height: 1.6;
}

header {
    background-color: #5e2b97; 
    color: white;
    padding: 20px;
    text-align: center;
}

header h1 {
    margin-bottom: 10px;
}

nav a {
    color: white;
    text-decoration: none;
    margin: 0 10px;
    font-weight: bold;
}

nav a:hover {
    text-decoration: underline;
}

section {
    display: flex;
    flex-wrap: wrap;
    padding: 20px;
}

article {
    flex: 3;
    background-color: white;
    padding: 20px;
    margin-right: 15px;
    border-radius: 10px;
}

aside {
    flex: 1;
    background-color: #ede3f7;
    padding: 15px;
    border-radius: 10px;
}

h2, h3 {
    color: #5e2b97;
    margin-bottom: 10px;
}

p {
    margin-bottom: 10px;
}

img {
    max-width: 100%;
    border-radius: 10px;
    margin-top: 10px;
}

ul, ol {
    margin-left: 20px;
    margin-bottom: 15px;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

table th {
    background-color: #5e2b97;
    color: white;
    padding: 8px;
}

table td {
    padding: 8px;
    text-align: center;
}

table, th, td {
    border: 1px solid #ccc;
}

form {
    background-color: #f9f6fc;
    padding: 20px;
    border-radius: 10px;
    max-width: 400px;
}

input, textarea {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

input[type="submit"] {
    background-color: #5e2b97;
    color: white;
    border: none;
    cursor: pointer;
    font-weight: bold;
    margin-top: 10px;
}

input[type="submit"]:hover {
    background-color: #4a227a;
}

@media (max-width: 768px) {
    section {
        flex-direction: column;
    }

    article {
        margin-right: 0;
        margin-bottom: 15px;
    }
}
input[type="submit"], input[type="reset"]{
    background-color: #5e2b97;
    color: white;
    border: none;
    padding: 10px 20px;
    margin-top: 10px;
    margin-right: 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
}

button{
    background-color: #5e2b97;
    color: white;
    border: none;
    padding: 10px 20px;
    margin-top: 10px;
    margin-right: 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
}

button:hover{
    background-color: #4a227a;
}
form{
    text-align: center;
}


</style>
<header>
    <h1>Contacto</h1>
    <nav>
        <a href="index.html">Inicio</a> 
        <a href="integrantes.html">Integrantes</a> 
        <a href="discografia.html">Discografía</a> 
        <a href="contacto.html">Contacto</a>
    </nav>
</header>

<section>
    <article>
        <h2>Formulario fan</h2>
         <form id="formularioFan" action="http://www2.gonzalonazareno.org/josedom/resultado.php" method="post" onsubmit="mostrarMensaje()">

         <label for="nombre">Nombre:</label><br>
         <input type="text" id="nombre" name="nombre" required><br><br>

         <label for="correo">Correo:</label><br>
         <input type="email" id="correo" name="correo" required><br><br>

         <label for="mensaje">Mensaje:</label><br>
         <textarea id="mensaje" name="mensaje" rows="4" cols="30"></textarea><br><br>

         <button type="submit">Enviar</button>
         <button type="reset">Borrar</button>

         </form>

         <p id="mensajeGracias" style="display:none; color:#5e2b97; font-weight:bold; text-align:center;">
         ¡Gracias por tu mensaje! 💜
         </p>
    </article>
</section>
     <script>
         function mostrarMensaje(){

         document.getElementById("formularioFan").style.display="none";

         document.getElementById("mensajeGracias").style.display="block";
         }
    </script>
</body>
</html>
